<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS RPG - 小说阅读风封面 V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1242px;
            height: 1660px;
            background: #FAF8F0;
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            position: relative;
        }
        
        /* 背景纹理 - 宣纸质感 */
        .texture {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(199, 237, 204, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.06) 0%, transparent 50%);
            opacity: 0.8;
        }
        
        /* 左侧装饰竖条 */
        .left-bar {
            position: absolute;
            left: 0;
            top: 0;
            width: 100px;
            height: 100%;
            background: linear-gradient(180deg, 
                #2C5F2D 0%, 
                #3A7A3C 20%,
                #4A8A4C 40%,
                #3A7A3C 60%,
                #2C5F2D 80%,
                #1E401F 100%
            );
            box-shadow: 4px 0 20px rgba(44, 95, 45, 0.3);
        }
        
        .left-bar::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, 
                #D4AF37 0%, 
                #F4CF47 50%, 
                #D4AF37 100%
            );
        }
        
        /* 竖排装饰文字 */
        .vertical-text {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 22px;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 12px;
            line-height: 2;
        }
        
        /* 主容器 */
        .container {
            position: relative;
            margin-left: 100px;
            padding: 80px 70px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* 顶部区域 */
        .header {
            margin-bottom: 60px;
        }
        
        .tag-line {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 8px 0;
            border-bottom: 2px solid rgba(44, 95, 45, 0.2);
            margin-bottom: 40px;
        }
        
        .tag {
            font-size: 18px;
            font-weight: 500;
            color: #7A9A7C;
            letter-spacing: 6px;
        }
        
        .tag-divider {
            width: 1px;
            height: 16px;
            background: rgba(44, 95, 45, 0.3);
        }
        
        /* 主标题 */
        .title-group {
            position: relative;
            margin-bottom: 30px;
        }
        
        .main-title {
            font-size: 80px;
            font-weight: 900;
            color: #1A2F1C;
            line-height: 1.2;
            letter-spacing: 4px;
            position: relative;
            z-index: 2;
        }
        
        .main-title .highlight {
            color: #B8942E;
            position: relative;
            display: inline-block;
        }
        
        .main-title .highlight::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 0;
            right: 0;
            height: 16px;
            background: rgba(212, 175, 55, 0.25);
            z-index: -1;
        }
        
        .subtitle {
            font-size: 32px;
            font-weight: 400;
            color: #5A7A5C;
            margin-top: 20px;
            letter-spacing: 2px;
        }
        
        /* 核心展示区 */
        .core-section {
            background: linear-gradient(135deg, 
                rgba(199, 237, 204, 0.15) 0%, 
                rgba(199, 237, 204, 0.08) 100%
            );
            border-left: 5px solid #C7EDCC;
            border-radius: 0 16px 16px 0;
            padding: 50px 60px;
            margin: 40px 0;
            position: relative;
            box-shadow: 0 8px 32px rgba(44, 95, 45, 0.08);
        }
        
        .core-section::before {
            content: '"';
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 120px;
            font-weight: 300;
            color: rgba(212, 175, 55, 0.15);
            line-height: 1;
            font-family: Georgia, serif;
        }
        
        .core-text {
            font-size: 30px;
            color: #2A4A2C;
            line-height: 2;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }
        
        .core-text .emphasis {
            font-size: 36px;
            font-weight: 700;
            color: #B8942E;
            display: block;
            margin: 15px 0;
            letter-spacing: 1px;
        }
        
        .core-text .small {
            font-size: 26px;
            color: #5A7A5C;
            font-style: italic;
        }
        
        /* 特色标签组 */
        .features {
            display: flex;
            gap: 20px;
            margin: 50px 0;
        }
        
        .feature-tag {
            flex: 1;
            padding: 24px 30px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(199, 237, 204, 0.5);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(44, 95, 45, 0.06);
        }
        
        .feature-tag .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .feature-tag .text {
            font-size: 22px;
            color: #3A5A3C;
            font-weight: 600;
        }
        
        /* 底部品牌区 */
        .footer {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding-top: 40px;
            border-top: 1px solid rgba(44, 95, 45, 0.1);
        }
        
        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .brand-name {
            font-size: 48px;
            font-weight: 900;
            color: #2C5F2D;
            letter-spacing: 6px;
        }
        
        .brand-desc {
            font-size: 20px;
            color: #7A9A7C;
            font-weight: 400;
        }
        
        .qr-placeholder {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #2C5F2D 0%, #3A7A3C 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            text-align: center;
            line-height: 1.4;
            box-shadow: 0 8px 24px rgba(44, 95, 45, 0.2);
        }
        
        /* 装饰印章 */
        .seal {
            position: absolute;
            right: 80px;
            top: 120px;
            width: 100px;
            height: 100px;
            border: 3px solid rgba(184, 148, 46, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 28px;
            color: rgba(184, 148, 46, 0.6);
            transform: rotate(15deg);
            opacity: 0.7;
        }
        
        .seal::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 2px solid rgba(184, 148, 46, 0.3);
            border-radius: 50%;
        }
        
        /* 右下角装饰 */
        .corner-decoration {
            position: absolute;
            right: 30px;
            bottom: 40px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at center, 
                rgba(199, 237, 204, 0.2) 0%, 
                transparent 70%
            );
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="texture"></div>
    <div class="left-bar"></div>
    <div class="vertical-text">千倍返还 · 道侣系统</div>
    <div class="seal">武侠</div>
    <div class="corner-decoration"></div>
    
    <div class="container">
        <div class="header">
            <div class="tag-line">
                <span class="tag">AI驱动</span>
                <span class="tag-divider"></span>
                <span class="tag">文字冒险</span>
                <span class="tag-divider"></span>
                <span class="tag">修仙世界</span>
            </div>
            
            <div class="title-group">
                <h1 class="main-title">
                    我让AI写了<br>
                    一个<span class="highlight">武侠世界</span>
                </h1>
                <p class="subtitle">加载即玩 · 5秒开始你的修仙之旅</p>
            </div>
        </div>
        
        <div class="core-section">
            <div class="core-text">
                穿越修仙世界，觉醒千倍返还系统
                <span class="emphasis">「一朵野花，换来500灵石和顶级剑法」</span>
                <span class="small">投资道侣，稳赚不赔</span>
            </div>
        </div>
        
        <div class="features">
            <div class="feature-tag">
                <div class="icon">⚡</div>
                <div class="text">零配置启动</div>
            </div>
            <div class="feature-tag">
                <div class="icon">🎭</div>
                <div class="text">自定义世界观</div>
            </div>
            <div class="feature-tag">
                <div class="icon">💾</div>
                <div class="text">5个存档槽位</div>
            </div>
        </div>
        
        <div class="footer">
            <div class="brand-section">
                <div class="brand-name">SMS RPG</div>
                <div class="brand-desc">你的武侠世界，由此开始</div>
            </div>
            <div class="qr-placeholder">
                扫码<br>立即体验
            </div>
        </div>
    </div>
</body>
</html>
