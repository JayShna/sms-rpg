<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS RPG - 神秘修仙风封面 V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1242px;
            height: 1660px;
            background: linear-gradient(180deg, 
                #0a0e27 0%, 
                #1a1f3a 30%,
                #252b48 60%,
                #1a1f3a 85%,
                #0f1325 100%
            );
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* 星空背景 */
        .stars-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 100px 150px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 300px 250px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 500px 100px, rgba(255,255,255,0.9), transparent),
                radial-gradient(2px 2px at 700px 350px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 900px 200px, rgba(255,255,255,0.7), transparent),
                radial-gradient(3px 3px at 150px 400px, rgba(212, 175, 55, 0.6), transparent),
                radial-gradient(2px 2px at 400px 500px, rgba(212, 175, 55, 0.4), transparent),
                radial-gradient(2px 2px at 800px 450px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 250px 600px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 600px 550px, rgba(255,255,255,0.5), transparent);
            background-size: 1000px 800px;
            animation: starTwinkle 4s ease-in-out infinite;
        }
        
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        /* 流光效果 */
        .flowing-light {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(212, 175, 55, 0.03) 50%, 
                transparent 70%
            );
            animation: flowMove 8s linear infinite;
        }
        
        @keyframes flowMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        /* 主容器 */
        .container {
            position: relative;
            z-index: 2;
            padding: 100px 80px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        /* 系统框 */
        .system-frame {
            width: 950px;
            background: linear-gradient(135deg, 
                rgba(212, 175, 55, 0.08) 0%, 
                rgba(212, 175, 55, 0.03) 100%
            );
            border: 2px solid rgba(212, 175, 55, 0.5);
            border-radius: 32px;
            padding: 70px 50px;
            position: relative;
            margin-bottom: 50px;
            box-shadow: 
                0 0 80px rgba(212, 175, 55, 0.2),
                inset 0 0 60px rgba(212, 175, 55, 0.05);
        }
        
        /* 角落装饰 */
        .system-frame::before,
        .system-frame::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(212, 175, 55, 0.6);
        }
        
        .system-frame::before {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
            border-radius: 8px 0 0 0;
        }
        
        .system-frame::after {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
            border-radius: 0 0 8px 0;
        }
        
        /* 系统标签 */
        .system-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1a1f3a 0%, #252b48 100%);
            padding: 10px 50px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 20px;
            font-size: 22px;
            color: #D4AF37;
            letter-spacing: 12px;
            font-weight: 500;
        }
        
        /* 系统标题 */
        .system-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 110px;
            color: #D4AF37;
            margin-bottom: 35px;
            text-shadow: 
                0 0 40px rgba(212, 175, 55, 0.8),
                0 0 80px rgba(212, 175, 55, 0.4);
            letter-spacing: 15px;
            position: relative;
        }
        
        .system-title::after {
            content: '千倍返还';
            position: absolute;
            left: 0;
            top: 0;
            color: transparent;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(212, 175, 55, 0.3) 50%, 
                transparent 100%
            );
            background-clip: text;
            -webkit-background-clip: text;
            animation: textShine 3s linear infinite;
        }
        
        @keyframes textShine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        /* 系统描述 */
        .system-desc {
            font-size: 36px;
            color: #C7EDCC;
            line-height: 2;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        .system-desc .gold {
            color: #D4AF37;
            font-weight: 600;
        }
        
        /* 金句区域 */
        .quote-section {
            margin: 50px 0;
            padding: 40px 60px;
            background: rgba(199, 237, 204, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(199, 237, 204, 0.2);
        }
        
        .quote {
            font-size: 34px;
            color: rgba(199, 237, 204, 0.9);
            font-style: italic;
            line-height: 2;
            font-weight: 300;
        }
        
        .quote-line {
            display: block;
            margin: 10px 0;
        }
        
        /* 特效展示 */
        .effect-showcase {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
            padding: 30px;
        }
        
        .effect-item {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: line-through;
        }
        
        .effect-arrow {
            font-size: 48px;
            color: #D4AF37;
            animation: arrowGlow 1.5s ease-in-out infinite;
        }
        
        @keyframes arrowGlow {
            0%, 100% { 
                transform: translateX(0);
                text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
            }
            50% { 
                transform: translateX(10px);
                text-shadow: 0 0 40px rgba(212, 175, 55, 1);
            }
        }
        
        .effect-result {
            font-size: 38px;
            color: #D4AF37;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
        }
        
        /* 品牌区 */
        .brand-section {
            margin-top: 60px;
            text-align: center;
        }
        
        .brand-name {
            font-size: 56px;
            font-weight: 900;
            color: #C7EDCC;
            letter-spacing: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(199, 237, 204, 0.3);
        }
        
        .brand-tagline {
            font-size: 26px;
            color: rgba(199, 237, 204, 0.7);
            letter-spacing: 4px;
            font-weight: 300;
        }
        
        /* 装饰光球 */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.4) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            animation: orbFloat 8s ease-in-out infinite;
        }
        
        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(199, 237, 204, 0.3) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
            animation: orbFloat 10s ease-in-out infinite reverse;
        }
        
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }
        
        /* 浮动粒子 */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #D4AF37;
            border-radius: 50%;
            animation: particleFloat 6s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
        }
        
        @keyframes particleFloat {
            0%, 100% { 
                transform: translateY(0) scale(1);
                opacity: 0.8;
            }
            50% { 
                transform: translateY(-100px) scale(1.2);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="stars-layer"></div>
    <div class="flowing-light"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <div class="particle" style="left: 15%; top: 20%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 25%; top: 60%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 75%; top: 30%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 85%; top: 70%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 45%; top: 80%; animation-delay: 1.5s;"></div>
    
    <div class="container">
        <div class="system-frame">
            <div class="system-label">系统觉醒</div>
            <h1 class="system-title">千倍返还</h1>
            <p class="system-desc">
                送道侣礼物，获<span class="gold">千倍返还</span><br>
                投资道侣，稳赚不赔
            </p>
        </div>
        
        <div class="quote-section">
            <div class="quote">
                <span class="quote-line">「野花赠佳人，千倍返灵石」</span>
                <span class="quote-line">「投资道侣，稳赚不赔」</span>
            </div>
        </div>
        
        <div class="effect-showcase">
            <div class="effect-item">一朵野花</div>
            <div class="effect-arrow">→</div>
            <div class="effect-result">500灵石 + 顶级剑法</div>
        </div>
        
        <div class="brand-section">
            <div class="brand-name">SMS RPG</div>
            <div class="brand-tagline">你的武侠世界 · 由此开始</div>
        </div>
    </div>
</body>
</html>
